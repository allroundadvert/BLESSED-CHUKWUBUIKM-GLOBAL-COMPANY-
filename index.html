body {

}

.header-text {

.section { padding: 15px; }

.card {
    background: white;
    padding: 15px;

    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.2);
}

.btn {
    display: block;
    text-align: center;
    padding: 12px;
    margin: 10px 0;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.whatsapp { background: green; }
.call { background: red; }

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

label { display: block; margin-top: 8px; }

button {
    background: black;
    color: gold;
    border: none;
    padding: 12px;
    margin-top: 10px;
    width: 100%;
    border-radius: 8px;
    font-weight: bold;
}

.map iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
}

/* SLIDER */
.slider { overflow: hidden; }

.slide-track {
    display: flex;
    width: 200%;
    animation: slide 6s linear infinite;
}

.slide-track img {
    width: 50%;
}

@keyframes slide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.grid img {
    width: 100%;
    border-radius: 10px;
}
</style>
